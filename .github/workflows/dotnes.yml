name: .NES

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: install .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.x
    - name: cache ANESE downloads
      uses: ./.github/workflows/cache-anese
    - name: cache Mesen downloads
      uses: ./.github/workflows/cache-mesen
    - name: build
      run: dotnet build -bl:build-debug.binlog && dotnet build -c Release -bl:build-release.binlog
    - name: test
      run: dotnet test --verbosity normal && dotnet test --verbosity normal -c Release
    - name: samples
      run: dotnet build samples/samples.sln -bl:samples-debug.binlog && dotnet build samples/samples.sln -c Release -bl:samples-release.binlog
    - name: shutdown (best effort)
      if: always()
      run: dotnet build-server shutdown
      continue-on-error: true # best-effort cleanup; failures intentionally ignored
    - name: upload logs
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: logs
        path: '*.binlog'
        if-no-files-found: error
    - name: upload ROMs
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: ROMs
        path: |
          samples/*/bin/**/*.nes
          samples/*/bin/**/*.dll
        if-no-files-found: error
    - name: upload nupkgs
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: nupkgs
        path: |
          bin/Release/*.nupkg
        if-no-files-found: error

  smoke-test:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v6
      with:
        sparse-checkout: scripts/smoke-test.lua
        sparse-checkout-cone-mode: false
    - name: install .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.x
    - name: download nupkgs
      uses: actions/download-artifact@v4
      with:
        name: nupkgs
        path: nupkgs
    - name: install template
      shell: bash
      run: dotnet new install nupkgs/dotnes.templates.*.nupkg
    - name: create project
      run: dotnet new nes --output smoketest
    - name: add local NuGet source
      run: dotnet nuget add source "${{ github.workspace }}/nupkgs" --name local
    - name: build project
      run: dotnet build smoketest/smoketest.csproj
    - name: run smoke test
      shell: bash
      run: |
        # Locate the Mesen binary installed by dotnes.mesen during build
        NUGET_DIR="$HOME/.nuget/packages"
        if [ "$RUNNER_OS" = "Windows" ]; then
          NUGET_DIR="$USERPROFILE/.nuget/packages"
          MESEN="$NUGET_DIR/dotnes.mesen/2.1.1/bin/Mesen.exe"
        elif [ "$RUNNER_OS" = "macOS" ]; then
          MESEN="$NUGET_DIR/dotnes.mesen/2.1.1/bin/Mesen.app/Contents/MacOS/Mesen"
        else
          MESEN="$NUGET_DIR/dotnes.mesen/2.1.1/bin/Mesen"
        fi
        ROM="smoketest/bin/Debug/net10.0/smoketest.nes"
        "$MESEN" "$ROM" --testrunner --doNotSaveSettings --timeout=10 \
          "${{ github.workspace }}/scripts/smoke-test.lua"

