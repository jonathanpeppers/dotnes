name: Cache Mesen Downloads
description: Caches Mesen emulator downloads to speed up builds and avoid download failures

runs:
  using: composite
  steps:
  - name: Cache Mesen downloads
    uses: actions/cache@v5
    with:
      path: src/dotnes.mesen/bin
      key: mesen-${{ runner.os }}-${{ hashFiles('src/dotnes.mesen/build/dotnes.mesen.targets') }}
